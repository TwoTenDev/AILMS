services:
  moodle:
    ports: |reset []
    environment:
      MOODLE_HOST: ${DOMAIN}
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.moodle.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.moodle.entrypoints=websecure"
      - "traefik.http.routers.moodle.tls.certresolver=letsencrypt"
      - "traefik.http.services.moodle.loadbalancer.server.port=8080"
      - "traefik.docker.network=proxy"

  chatbot:
    ports: []
    environment:
      ALLOWED_ORIGINS: https://${DOMAIN}
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chatbot.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`, `/admin`, `/ingest`)"
      - "traefik.http.routers.chatbot.entrypoints=websecure"
      - "traefik.http.routers.chatbot.tls.certresolver=letsencrypt"
      - "traefik.http.services.chatbot.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
